strata-ledger-types.workspace = true
strata-ol-chain-types-new.workspace = true
strata-ol-da.workspace = true
strata-ol-stf = { workspace = true, features = ["test-utils"] }
strata-snark-acct-runtime.workspace = true
strata-snark-acct-types.workspace = true
strata-zkvm-hosts.workspace = true

reth-chainspec.workspace = true
reth-primitives-traits.workspace = true
rsp-client-executor.workspace = true
rsp-primitives.workspace = true

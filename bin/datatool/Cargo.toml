[package]
edition = "2021"
name = "strata-datatool"
version = "0.3.0-alpha.1"

[lints]
workspace = true

[[bin]]
name = "strata-datatool"
path = "src/main.rs"

[dependencies]
alpen-ee-config.workspace = true
alpen-chainspec.workspace = true
strata-asm-params.workspace = true
strata-asm-proto-bridge-v1-types.workspace = true
strata-btc-types.workspace = true
strata-btc-verification.workspace = true
strata-crypto.workspace = true
strata-ee-acct-types.workspace = true
strata-identifiers.workspace = true
strata-key-derivation.workspace = true
strata-l1-txfmt.workspace = true
strata-ol-genesis.workspace = true
strata-ol-params.workspace = true
strata-predicate.workspace = true
strata-primitives.workspace = true
strata-proofimpl-alpen-acct.workspace = true
strata-proofimpl-checkpoint.workspace = true
strata-proofimpl-predicate-keys = { workspace = true, optional = true }
strata-snark-acct-runtime.workspace = true

strata-sp1-guest-builder = { path = "../../provers/sp1", optional = true }

alloy-primitives.workspace = true
anyhow.workspace = true
argh.workspace = true
bitcoin = { workspace = true, features = ["std"] }
bitcoind-async-client = { workspace = true, optional = true }
hex.workspace = true
rand_core.workspace = true
serde_json.workspace = true
tokio = { workspace = true, optional = true }
zeroize.workspace = true

[features]
default = ["btc-client"]
btc-client = ["dep:bitcoind-async-client", "dep:tokio"]
sp1-builder = [
  "strata-sp1-guest-builder/sp1-dev",
  "dep:strata-proofimpl-predicate-keys",
  "strata-proofimpl-predicate-keys/sp1",
]
sp1-docker-builder = ["sp1-builder", "strata-sp1-guest-builder/docker-build"]

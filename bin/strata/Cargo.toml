[package]
name = "strata"
version = "0.1.0"
edition = "2024"

[features]
default = ["sequencer"]
sequencer = [
  "dep:strata-asm-proto-checkpoint-txs",
  "dep:strata-codec",
  "dep:strata-codec-utils",
  "dep:strata-crypto",
  "dep:strata-ol-block-assembly",
  "dep:strata-ol-sequencer",
  "dep:strata-ol-state-provider",
]
debug-asm = ["strata-consensus-logic/debug-asm"]
debug-utils = [
  "strata-common/debug-utils",
  "strata-consensus-logic/debug-utils",
  "strata-csm-worker/debug-utils",
  "strata-ol-block-assembly?/debug-utils",
  "strata-ol-sequencer?/debug-utils",
]
prover = [
  "dep:borsh",
  "dep:strata-ol-state-support-types",
  "dep:strata-ol-stf",
  "dep:strata-paas",
  "dep:strata-predicate",
  "dep:strata-proofimpl-checkpoint",
  "dep:zkaleido",
]
sp1 = [
  "prover",
  "strata-paas/remote",
  "dep:strata-zkvm-hosts",
  "dep:zkaleido-sp1-host",
  "strata-zkvm-hosts/sp1",
]

[dependencies]
ssz.workspace = true
strata-acct-types.workspace = true
strata-asm-common.workspace = true
strata-asm-params.workspace = true
strata-asm-proto-checkpoint-txs = { workspace = true, optional = true }
strata-asm-worker.workspace = true
strata-btc-types.workspace = true
strata-btcio.workspace = true
strata-chain-worker-new.workspace = true
strata-checkpoint-types.workspace = true
strata-codec = { workspace = true, optional = true }
strata-codec-utils = { workspace = true, optional = true }
strata-common = { workspace = true, optional = true }
strata-config.workspace = true
strata-consensus-logic.workspace = true
strata-crypto = { workspace = true, optional = true }
strata-csm-types.workspace = true
strata-csm-worker.workspace = true
strata-db-store-sled.workspace = true
strata-db-types.workspace = true
strata-identifiers.workspace = true
strata-ledger-types.workspace = true
strata-logging.workspace = true
strata-node-context.workspace = true
strata-ol-block-assembly = { workspace = true, optional = true }
strata-ol-chain-types-new.workspace = true
strata-ol-checkpoint.workspace = true
strata-ol-genesis.workspace = true
strata-ol-mempool.workspace = true
strata-ol-params.workspace = true
strata-ol-rpc-api.workspace = true
strata-ol-rpc-types.workspace = true
strata-ol-sequencer = { workspace = true, optional = true }
strata-ol-state-provider = { workspace = true, optional = true }
strata-ol-state-support-types = { workspace = true, optional = true }
strata-ol-state-types.workspace = true
strata-ol-stf = { workspace = true, optional = true }
strata-paas = { workspace = true, optional = true }
strata-params.workspace = true
strata-predicate = { workspace = true, optional = true }
strata-primitives.workspace = true
strata-proofimpl-checkpoint = { workspace = true, optional = true }
strata-service.workspace = true
strata-snark-acct-types.workspace = true
strata-status.workspace = true
strata-storage.workspace = true
strata-tasks.workspace = true
strata-zkvm-hosts = { workspace = true, optional = true }

metrics-exporter-prometheus.workspace = true

anyhow.workspace = true
argh.workspace = true
async-trait.workspace = true
bitcoin.workspace = true
bitcoind-async-client.workspace = true
borsh = { workspace = true, optional = true }
format_serde_error.workspace = true
jsonrpsee = { workspace = true, features = ["server", "macros"] }
serde_json.workspace = true
thiserror.workspace = true
threadpool.workspace = true
tokio.workspace = true
toml.workspace = true
tracing.workspace = true
zkaleido = { workspace = true, optional = true }
zkaleido-sp1-host = { workspace = true, features = [
  "remote-prover",
], optional = true }

[dev-dependencies]
strata-ol-params.workspace = true
strata-ol-state-support-types.workspace = true
strata-ol-state-types = { workspace = true, features = ["test-utils"] }
strata-predicate.workspace = true

[lints]
workspace = true

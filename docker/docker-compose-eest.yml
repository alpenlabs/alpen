# Setup for Ethereum Execution Spec Tests (EEST).
# Runs alpen-client in sequencer mode with dummy OL and native chunk proving.
# EEST only exercises execution-layer behavior, so this stack intentionally
# omits OL and Bitcoin DA services.
#
# Usage:
#   ./init-eest-keys.sh
#   docker compose --env-file .env.alpen -f docker-compose-eest.yml up

services:

  alpen-client:
    image: alpen-client:latest
    container_name: alpen_eest
    entrypoint: ["alpen-client"]
    command:
      - --sequencer
      - --sequencer-pubkey
      - ${SEQUENCER_PUBKEY}
      - --dummy-ol-client
      - --dev-native-prover
      - --custom-chain
      - ${CHAIN_SPEC:-dev}
      - --batch-sealing-block-count
      - ${BATCH_SEALING_BLOCK_COUNT:-5}
      - --datadir
      - /app/data
      - --p2p-secret-key
      - /app/keys/seq-p2p.hex
      - --addr
      - "0.0.0.0"
      - --port
      - "30303"
      - --nat
      - none
      - --disable-discovery
      - --http
      - --http.addr
      - "0.0.0.0"
      - --http.port
      - "8545"
      - --http.api
      - eth,net,web3,txpool,admin,debug
      - --txpool.minimal-protocol-fee
      - "0"
      - --color
      - never
    environment:
      SEQUENCER_PRIVATE_KEY: ${SEQUENCER_PRIVATE_KEY}
      ALPEN_EE_BLOCK_TIME_MS: ${ALPEN_EE_BLOCK_TIME_MS:-1000}
      RUST_LOG: ${RUST_LOG:-info}
      NO_COLOR: "1"
    ports:
      - "8545:8545"
    volumes:
      - ./configs/alpen-client/seq-p2p.hex:/app/keys/seq-p2p.hex:ro
    networks:
      - eest

networks:
  eest:
    driver: bridge

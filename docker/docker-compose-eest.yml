# Setup for Ethereum Execution Spec Tests (EEST).
# Runs alpen-client in sequencer mode with dummy OL + regtest bitcoind for DA.
#
# Usage:
#   ./init-eest-keys.sh
#   docker compose --env-file .env.alpen -f docker-compose-eest.yml up

services:

  bitcoind:
    build:
      context: ./bitcoind/
    image: strata_bitcoind:v0.1.2
    container_name: eest_bitcoind
    environment:
      RPC_ALLOW_IP: "0.0.0.0/0"
      BITCOIND_RPC_USER: ${BITCOIND_RPC_USER:-rpcuser}
      BITCOIND_RPC_PASSWORD: ${BITCOIND_RPC_PASSWORD:-rpcpassword}
      BITCOIND_WALLET: default
      GENERATE_BLOCKS: 101
    volumes:
      - ./bitcoind/entrypoint.sh:/app/entrypoint.sh
    ports:
      - "18443:18443"
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -regtest -rpcuser=${BITCOIND_RPC_USER} -rpcpassword=${BITCOIND_RPC_PASSWORD} getwalletinfo"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      - eest

  alpen-client:
    image: alpen-client:latest
    container_name: alpen_eest
    depends_on:
      bitcoind:
        condition: service_healthy
    command:
      - --p2p-secret-key
      - /app/keys/seq-p2p.hex
      - --port
      - "30303"
      - --nat
      - none
      - --disable-discovery
      - --dev-native-prover
      - --ee-proof-pipeline-rpc
      - --color
      - never
    environment:
      SEQUENCER_PRIVATE_KEY: ${SEQUENCER_PRIVATE_KEY}
      SEQUENCER_PUBKEY: ${SEQUENCER_PUBKEY}
      DUMMY_OL_CLIENT: "1"
      CHAIN_SPEC: ${CHAIN_SPEC:-dev}
      BITCOIND_RPC_URL: http://bitcoind:${BITCOIND_RPC_PORT:-18443}
      BITCOIND_RPC_USER: ${BITCOIND_RPC_USER:-rpcuser}
      BITCOIND_RPC_PASSWORD: ${BITCOIND_RPC_PASSWORD:-rpcpassword}
      EE_DA_MAGIC_BYTES: ${EE_DA_MAGIC_BYTES:-ALPN}
      L1_REORG_SAFE_DEPTH: "${L1_REORG_SAFE_DEPTH:-1}"
      GENESIS_L1_HEIGHT: "${GENESIS_L1_HEIGHT:-101}"
      BATCH_SEALING_BLOCK_COUNT: "${BATCH_SEALING_BLOCK_COUNT:-5}"
      HTTP_API: ${HTTP_API:-eth,net,web3,txpool,admin,debug,alpen}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "8545:8545"
    volumes:
      - ./configs/alpen-client/jwt.hex:/app/keys/jwt.hex:ro
      - ./configs/alpen-client/seq-p2p.hex:/app/keys/seq-p2p.hex:ro
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    networks:
      - eest

networks:
  eest:
    driver: bridge

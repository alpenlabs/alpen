services:
  alpen-fullnode:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: docker/alpen-client/Dockerfile.local
    image: ${ALPEN_IMAGE:-alpen-client:latest}
    environment:
      RUST_LOG: ${RUST_LOG:-info,alpen_gossip=info}
      SEQUENCER_PUBKEY: ${SEQUENCER_PUBKEY:-}
      GENESIS_L1_HEIGHT: ${GENESIS_L1_HEIGHT:-}
      CHAIN_SPEC: ${CHAIN_SPEC:-testnet3}
      OL_CLIENT_URL: ${OL_CLIENT_URL:-https://strata.testnet.alpen.org}
      BRIDGE_DENOMINATION: ${BRIDGE_DENOMINATION:-200000000}
      MAX_WITHDRAWAL_AMOUNT: ${MAX_WITHDRAWAL_AMOUNT:-18446744073600000000}
    command:
      - --sequencer-http
      - ${SEQUENCER_HTTP:-}
      - --bootnodes
      - ${BOOTNODE_ENODE:-}
      - --trusted-peers
      - ${TRUSTED_PEERS:-${BOOTNODE_ENODE:-}}
    volumes:
      - ./configs/generated/jwt.hex:/app/keys/jwt.hex:ro
      - alpen-fullnode-data:/app/data
    ports:
      - "9545:8545"
      - "9546:8546"
      - "30303:30303/tcp"
      - "30303:30303/udp"
    networks:
      - alpen_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

volumes:
  alpen-fullnode-data:

networks:
  alpen_network:
    driver: bridge
    name: alpen_network

services:
  alpen-fullnode:
    platform: ${ALPEN_PLATFORM:-linux/amd64}
    image: ${ALPEN_IMAGE:?ALPEN_IMAGE must be set}
    environment:
      RUST_LOG: ${RUST_LOG:-info,alpen_gossip=info}
    entrypoint: ["alpen-client"]
    command:
      - --sequencer-pubkey
      - ${SEQUENCER_PUBKEY:?SEQUENCER_PUBKEY must be set}
      - --ol-client-url
      - ${OL_CLIENT_URL:-ws://strata-checkpoint-sync:8432}
      - --custom-chain
      - ${CHAIN_SPEC:-testnet}
      - --datadir
      - /app/data
      - --sequencer-http
      - ${SEQUENCER_HTTP:?SEQUENCER_HTTP must be set}
      - --p2p-secret-key
      - /app/keys/fn-p2p.hex
      - --addr
      - "0.0.0.0"
      - --port
      - "31303"
      - --discovery.port
      - "31303"
      - --nat
      - none
      - --bootnodes
      - ${BOOTNODE_ENODE:?BOOTNODE_ENODE must be set}
      - --trusted-peers
      - ${TRUSTED_PEER_ENODE:-${BOOTNODE_ENODE}}
      - --http
      - --http.addr
      - "0.0.0.0"
      - --http.port
      - "8545"
      - --http.api
      - eth,net,web3,txpool,debug,trace
      - --ws
      - --ws.addr
      - "0.0.0.0"
      - --ws.port
      - "8546"
      - --ws.api
      - eth,net,web3,txpool
      - --authrpc.addr
      - "0.0.0.0"
      - --authrpc.port
      - "8551"
      - --genesis-l1-height
      - "${GENESIS_L1_HEIGHT:?GENESIS_L1_HEIGHT must be set}"
      - --metrics
      - 0.0.0.0:9001
    volumes:
      - ./configs/generated/fn-p2p.hex:/app/keys/fn-p2p.hex:ro
      - alpen-fullnode-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9545:8545"
      - "9546:8546"
      - "31303:31303/tcp"
      - "31303:31303/udp"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - alpen_network
    restart: unless-stopped

volumes:
  alpen-fullnode-data:

networks:
  alpen_network:
    external: true
    name: alpen_network

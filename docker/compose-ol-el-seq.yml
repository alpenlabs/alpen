services:
  strata:
    build:
      context: ..
      dockerfile: docker/strata/Dockerfile.local
      args:
        CARGO_FEATURES: ${STRATA_CARGO_FEATURES:-}
    image: strata:latest
    env_file:
      - .env
    environment:
      CONFIG_PATH: /app/configs/config.seq.toml
      SEQUENCER_CONFIG_PATH: /app/configs/sequencer.toml
      PARAM_PATH: /app/configs/generated/rollup-params.json
      OL_PARAMS_PATH: /app/configs/generated/ol-params.json
      ASM_PARAMS_PATH: /app/configs/generated/asm-params.json
      RUST_BACKTRACE: 1
    volumes:
      # Explicitly mount only what strata reads — no whole-dir mount.
      # This knowledge will be helpful in k8s deployment.
      # Committed configs:
      - ./configs/config.seq.toml:/app/configs/config.seq.toml:ro
      - ./configs/sequencer.toml:/app/configs/sequencer.toml:ro
      # Generated by init:
      - ./configs/generated/rollup-params.json:/app/configs/generated/rollup-params.json:ro
      - ./configs/generated/ol-params.json:/app/configs/generated/ol-params.json:ro
      - ./configs/generated/asm-params.json:/app/configs/generated/asm-params.json:ro
      # SP1 ELFs (empty dir when SP1 disabled — harmless)
      - ./elfs:/app/elfs/sp1:ro
      - strata-data:/app/data
    ports:
      - "8432:8432"
    networks:
      - alpen_network
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    healthcheck:
      test: >-
        curl -sf -X POST -H 'Content-Type: application/json'
        -d '{"jsonrpc":"2.0","method":"strata_protocolVersion","params":[],"id":1}'
        http://localhost:8432
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  strata-signer:
    build:
      context: ..
      dockerfile: docker/strata-signer/Dockerfile
    image: strata-signer:latest
    depends_on:
      strata:
        condition: service_healthy
    volumes:
      # Signer reads only its config and the sequencer signing key.
      - ./configs/strata-signer:/app/configs/strata-signer:ro
      - ./configs/generated/sequencer.key:/app/configs/sequencer.key:ro
    networks:
      - alpen_network
    restart: unless-stopped

  alpen-client:
    build:
      context: ..
      dockerfile: docker/alpen-client/Dockerfile.local
    image: alpen-client:latest
    depends_on:
      strata:
        condition: service_healthy
    # Remove --dev-native-prover when using real SP1 proofs.
    command: ["--dev-native-prover"]
    env_file:
      - .env
      - ./configs/generated/.env.alpen
    volumes:
      # Alpen-client reads only the JWT secret for authrpc.
      # Env vars (pubkey, chain spec, etc.) come from env_file above.
      - ./configs/generated/jwt.hex:/app/keys/jwt.hex:ro
      # SP1 ELFs (empty dir when SP1 disabled — harmless)
      - ./elfs:/app/elfs/sp1:ro
      - alpen-client-data:/app/data
    ports:
      - "8545:8545"
      - "8546:8546"
    networks:
      - alpen_network
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    healthcheck:
      test: >-
        curl -sf -X POST -H 'Content-Type: application/json'
        -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
        http://localhost:8545
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    restart: unless-stopped

volumes:
  strata-data:
  alpen-client-data:

networks:
  alpen_network:
    external: true
    name: alpen_network

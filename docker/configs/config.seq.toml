# adjust according to deployment

[client]
rpc_host = "0.0.0.0"
rpc_port = 8432
admin_rpc_host = "0.0.0.0"
admin_rpc_port = 8434
admin_rpc_bearer_token = "dev-only-change-me"
submit_rpc_host = "0.0.0.0"
submit_rpc_port = 8435
submit_rpc_bearer_token = "dev-only-submit-token"
l2_blocks_fetch_limit = 1_000
datadir = "data"
db_retry_count = 5
is_sequencer = true

[logging]
metrics_host = "0.0.0.0"
metrics_port = 9615

[bitcoind]
rpc_url = "bitcoind:18443/wallet/default"
rpc_user = "rpcuser"
rpc_password = "rpcpassword"
network = "regtest"

[btcio]
# Depth, in L1 blocks, after which an L1 block is considered safe from reorgs.
# Set to 0 to follow the L1 tip with no reorg buffer.
l1_reorg_safe_depth = 4

[btcio.reader]
client_poll_dur_ms = 200

[btcio.writer]
write_poll_dur_ms = 200
fee_policy = "mempool"
# Required when fee_policy = "mempool"
# mempool_base_url = "https://mempool.space"
# Optional when fee_policy = "mempool"
# mempool_fee_policy = "economy"
# Optional when fee_policy = "mempool"
# mempool_fallback_conf_target = 6
# Optional when fee_policy = "bitcoind"
# bitcoind_conf_target = 6
# Required when fee_policy = "fixed" (sat/vB; fractional values allowed)
# fixed_fee_rate = 0.5
mempool_base_url = "https://mempool.space"
reveal_amount = 100
bundle_interval_ms = 1000

[btcio.broadcaster]
poll_interval_ms = 1000

# Uncomment for real SP1 proving (requires strata built with prover,sp1 features)
# [prover]
# backend = "sp1"

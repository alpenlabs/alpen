# Checkpoint-sync (non-sequencer) OL node. Reconstructs OL state from L1-buried
# checkpoints, so it depends only on a bitcoin chain — no sequencer, EE, or
# signer. Built without the sequencer feature.

services:
  strata-checkpoint-sync:
    build:
      context: ..
      dockerfile: docker/strata-checkpoint-sync/Dockerfile
    image: strata-checkpoint-sync:latest
    env_file:
      - .env
    environment:
      CONFIG_PATH: /app/configs/config.sync.toml
      OL_PARAMS_PATH: /app/configs/generated/ol-params.json
      ASM_PARAMS_PATH: /app/configs/generated/asm-params.json
      RUST_BACKTRACE: 1
    volumes:
      - ./configs/generated/config.sync.toml:/app/configs/config.sync.toml:ro
      - ./configs/generated/ol-params.json:/app/configs/generated/ol-params.json:ro
      - ./configs/generated/asm-params.json:/app/configs/generated/asm-params.json:ro
      - ./data:/app/data
    ports:
      - "8433:8432"
      - "9616:9615"
    networks:
      - alpen_network
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

volumes:
  strata-checkpoint-sync-data:

networks:
  alpen_network:
    external: true
    name: alpen_network

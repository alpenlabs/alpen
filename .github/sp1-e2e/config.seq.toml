# SP1 E2E CI — OL sequencer config
# Bitcoin creds overridden by entrypoint from env vars.

[client]
rpc_host = "0.0.0.0"
rpc_port = 8432
admin_rpc_host = "0.0.0.0"
admin_rpc_port = 8434
admin_rpc_bearer_token = "dev-only-change-me"
submit_rpc_host = "0.0.0.0"
submit_rpc_port = 8435
submit_rpc_bearer_token = "dev-only-submit-token"
l2_blocks_fetch_limit = 1_000
datadir = "/app/data"
db_retry_count = 5
is_sequencer = true

[bitcoind]
rpc_url = "bitcoind:38332"
rpc_user = "bitcoin"
rpc_password = "bitcoin"
network = "signet"

[btcio.reader]
client_poll_dur_ms = 5_000

[btcio.writer]
write_poll_dur_ms = 5_000
fee_policy = "bitcoind"
reveal_amount = 330
bundle_interval_ms = 1_000

[btcio.broadcaster]
poll_interval_ms = 1_000

[prover]
backend = "sp1"

# Generates full params (rollup-params, ol-params, asm-params) using the
# prebuilt datatool image from the specified commit. Static values (operator
# keys, deposit amounts, etc.) come from pre-committed templates per
# environment; dynamic values (VKs, genesis L1 view, genesis_ol_blkid) are
# filled in by datatool.
#
# Ref: STR-3635

name: CI — Generate Params

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment (template set)"
        required: true
        type: choice
        options:
          - staging-v2
          - testnet-prod
      commit:
        description: "Alpen commit short SHA (must have a successful CI — Build and Push Images run)"
        required: true
        type: string
      genesis_l1_height:
        description: "Genesis L1 block height"
        required: true
        type: string
      chain_config:
        description: "Path to chainspec JSON (relative to repo root)"
        required: false
        type: string
        default: "crates/reth/chainspec/src/res/testnet-chain.json"

env:
  AWS_REGION: us-east-1
  # Datatool images live in the shared ECR account (496607027995), not in
  # per-environment accounts. Hardcoded because the shared registry is
  # constant and avoids cross-account pull complexity.
  DATATOOL_REPO: 496607027995.dkr.ecr.us-east-1.amazonaws.com/strata/strata-datatool

concurrency:
  group: ci-genparams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Pull the datatool image from the shared ECR registry.
  # Uses the 'prod' environment because SHARED_ECR_ROLE_ARN lives there and
  # grants access to the 496607027995 account where datatool images are pushed
  # by ci-build. Per-environment accounts (e.g. testnet1_staging / 888577024788)
  # do not host datatool images.
  # ---------------------------------------------------------------------------
  pull-datatool:
    name: Pull datatool image
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials (shared ECR)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v4
        with:
          role-to-assume: ${{ secrets.SHARED_ECR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to shared ECR
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2
        with:
          mask-password: "true"

      - name: Pull and save datatool image
        run: |
          docker pull "${DATATOOL_REPO}:${{ inputs.commit }}"
          docker save "${DATATOOL_REPO}:${{ inputs.commit }}" -o /tmp/datatool.tar

      - name: Upload datatool image
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: datatool-image
          path: /tmp/datatool.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Generate params using the deployment environment's BTC RPC secrets.
  # ---------------------------------------------------------------------------
  generate-params:
    name: Generate params (${{ inputs.env }}, ${{ inputs.commit }})
    needs: [pull-datatool]
    runs-on: ubuntu-latest
    # TODO: switch to ${{ inputs.env }} once per-env GitHub environments are created
    environment: testnet1_staging
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          persist-credentials: false

      - name: Download datatool image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: datatool-image
          path: /tmp

      - name: Load datatool image
        run: docker load -i /tmp/datatool.tar

      - name: Generate params
        env:
          DEPLOY_ENV: ${{ inputs.env }}
          COMMIT: ${{ inputs.commit }}
          GENESIS_L1_HEIGHT: ${{ inputs.genesis_l1_height }}
          CHAIN_CONFIG: ${{ inputs.chain_config }}
          BTC_RPC_URL: ${{ secrets.PARAM_BTC_RPC_URL }}
          BTC_RPC_USER: ${{ secrets.PARAM_BTC_RPC_USER }}
          BTC_RPC_PASSWORD: ${{ secrets.PARAM_BTC_RPC_PASSWORD }}
        run: .github/params/generate-params.sh

      - name: rollup-params.json
        if: always()
        run: python3 -m json.tool .github/params/out/${{ inputs.env }}/rollup-params.json 2>/dev/null || echo "Not generated"

      - name: ol-params.json
        if: always()
        run: python3 -m json.tool .github/params/out/${{ inputs.env }}/ol-params.json 2>/dev/null || echo "Not generated"

      - name: asm-params.json
        if: always()
        run: python3 -m json.tool .github/params/out/${{ inputs.env }}/asm-params.json 2>/dev/null || echo "Not generated"

      - name: Upload params artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: params-${{ inputs.env }}-${{ inputs.commit }}
          path: .github/params/out/${{ inputs.env }}/
          retention-days: 30

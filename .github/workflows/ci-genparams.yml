# Generates SP1 verification key (checkpoint_predicate) when prover-related
# code changes, and dispatches the result to the deployments repo.
#
# This is separated from ci-build.yml because the VK only changes when guest
# program ELFs change — most merges to main don't affect it.
#
# Ref: STR-2775

name: CI — Generate SP1 Params

on:
  push:
    branches: [main]
    paths:
      - "provers/sp1/**"
      - "crates/**"
      - "Cargo.lock"
      - "docker/strata/elfs/**"
      - "rust-toolchain.toml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (default: current branch)"
        required: false
        type: string

env:
  AWS_REGION: us-east-1

concurrency:
  group: ci-genparams-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ---------------------------------------------------------------------------
  # Generate SP1 verification key
  # ---------------------------------------------------------------------------
  genparams:
    name: Generate SP1 params
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      checkpoint_predicate: ${{ steps.extract.outputs.checkpoint_predicate }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Resolve actual commit SHA
        id: resolve
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Resolved commit: ${COMMIT_SHA}"

      - name: Free up disk space
        uses: ./.github/actions/cleanup

      - name: Set up Clang
        uses: egor-tensin/setup-clang@471a6f8ef1d449dba8e1a51780e7f943572a3f99 # v1
        with:
          version: latest
          platform: x64

      - name: Install SP1 Toolchain
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 https://sp1.succinct.xyz | bash && ~/.sp1/bin/sp1up
          export PATH=~/.sp1/bin:$PATH
          cargo prove --version

      - name: Build strata-datatool
        run: |
          cargo build --bin strata-datatool -F "sp1-builder" --release

      - name: Generate params and extract VK
        id: extract
        run: |
          set -euo pipefail

          PARAMS_OUTPUT=$(./target/release/strata-datatool genparams \
            --genesis-l1-view-file .github/fixtures/genesis-l1-view.json \
            --elf-dir docker/strata/elfs/sp1)

          CHECKPOINT_PREDICATE=$(echo "$PARAMS_OUTPUT" | jq -r '.checkpoint_predicate')
          if [ -z "$CHECKPOINT_PREDICATE" ] || [ "$CHECKPOINT_PREDICATE" = "null" ]; then
            echo "::error::Failed to extract checkpoint_predicate from params"
            echo "Params output: $PARAMS_OUTPUT"
            exit 1
          fi

          echo "checkpoint_predicate=${CHECKPOINT_PREDICATE}" >> "$GITHUB_OUTPUT"
          echo "Checkpoint predicate: ${CHECKPOINT_PREDICATE}"

  # ---------------------------------------------------------------------------
  # Dispatch VK update to deployments repo
  # ---------------------------------------------------------------------------
  dispatch-vk:
    name: Dispatch VK to deployments
    needs: [genparams]
    runs-on: ubuntu-latest
    permissions: {}
    environment: prod
    steps:
      - name: Trigger deployments repo
        env:
          GH_TOKEN: ${{ secrets.DEPLOYMENTS_DISPATCH_TOKEN }}
          CHECKPOINT_PREDICATE: ${{ needs.genparams.outputs.checkpoint_predicate }}
          COMMIT_SHA: ${{ needs.genparams.outputs.commit_sha }}
        run: |
          jq -n \
            --arg cp "$CHECKPOINT_PREDICATE" \
            --arg sha "$COMMIT_SHA" \
            --arg ref "${GITHUB_REF_NAME}" \
            '{
              event_type: "new-arch-vk-update",
              client_payload: {
                checkpoint_predicate: $cp,
                commit_sha: $sha,
                ref: $ref
              }
            }' | gh api repos/alpenlabs/deployments/dispatches --method POST --input -

          echo "Dispatched VK update to deployments repo"

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Genparams Summary
    needs: [genparams, dispatch-vk]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Report results
        env:
          COMMIT_SHA: ${{ needs.genparams.outputs.commit_sha }}
          CHECKPOINT_PREDICATE: ${{ needs.genparams.outputs.checkpoint_predicate }}
          GENPARAMS_RESULT: ${{ needs.genparams.result }}
          DISPATCH_RESULT: ${{ needs.dispatch-vk.result }}
        run: |
          {
            echo "## SP1 Params Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Commit** | \`${COMMIT_SHA}\` |"
            echo "| **Ref** | \`${GITHUB_REF_NAME}\` |"
            echo "| **Genparams** | \`${GENPARAMS_RESULT}\` |"
            echo "| **VK Dispatch** | \`${DISPATCH_RESULT}\` |"
            echo "| **Checkpoint Predicate** | \`${CHECKPOINT_PREDICATE}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

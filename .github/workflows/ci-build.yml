# Builds new-architecture Docker images on merge to main (or manual dispatch)
# and pushes to the shared ECR account.
#
# Generate-params and CD dispatch are tracked separately (STR-2775).

name: CI — Build and Push Images

on:
  schedule:
    - cron: '30 4,10,16,22 * * *'  # Every 6hr, ~1.5hr before SP1 E2E test
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      # Only trigger when source code or Dockerfiles change
      - "bin/**"
      - "crates/**"
      - "docker/strata/**"
      - "docker/strata-checkpoint-sync/**"
      - "docker/alpen-client/**"
      - "docker/strata-signer/**"
      - "docker/strata-datatool/**"
      - "provers/sp1/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
  workflow_dispatch:
    inputs:
      # One checkbox per program — tick any subset (one, two, or all). All
      # default to true, so a plain dispatch builds everything. type:choice is
      # single-select only, hence booleans for real multi-select. Names use
      # underscores: hyphens break `inputs.x-y` (parsed as subtraction).
      strata:
        description: "Build strata (OL node)"
        type: boolean
        default: true
      strata_checkpoint_sync:
        description: "Build strata-checkpoint-sync"
        type: boolean
        default: true
      alpen_client:
        description: "Build alpen-client (EE)"
        type: boolean
        default: true
      strata_signer:
        description: "Build strata-signer"
        type: boolean
        default: true
      ref:
        description: "Git ref to build from (default: current branch)"
        required: false
        type: string

env:
  AWS_REGION: us-east-1

# Cancel in-progress runs for the same branch (except main — let those finish).
# Manual dispatches use unique groups so multiple requested builds can run at
# the same time.
concurrency:
  group: ci-build-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ---------------------------------------------------------------------------
  # Skip scheduled runs if no new commits since last successful build
  # ---------------------------------------------------------------------------
  check-new-commits:
    name: Check for new commits
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check for new commits since last success
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          LAST_SUCCESS=$(gh run list -R "${REPO}" \
            --workflow ci-build.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha // ""')

          if [ "${LAST_SUCCESS}" = "${GITHUB_SHA}" ]; then
            echo "No new commits since last successful build — skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "New commits found — running"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Determine which programs to build
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare build matrix
    needs: [check-new-commits]
    if: always() && (needs.check-new-commits.result == 'skipped' || needs.check-new-commits.outputs.should_run == 'true')
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      # true only when a selected program consumes SP1 artifacts (strata,
      # alpen-client). Lets build-sp1-artifacts skip itself entirely when the
      # run builds only non-SP1 images (strata-checkpoint-sync, strata-signer).
      needs_sp1: ${{ steps.set-matrix.outputs.needs_sp1 }}
    steps:
      - name: Set build matrix
        id: set-matrix
        env:
          EVENT: ${{ github.event_name }}
          SEL_STRATA: ${{ inputs.strata }}
          SEL_CHECKPOINT_SYNC: ${{ inputs.strata_checkpoint_sync }}
          SEL_ALPEN_CLIENT: ${{ inputs.alpen_client }}
          SEL_STRATA_SIGNER: ${{ inputs.strata_signer }}
        run: |
          # New architecture images only — pushed to shared ECR account.
          #
          # Single source of truth: program -> public ECR repo. An empty value
          # means private ECR only (no public mirror; e.g. strata-signer is
          # in-house — private ECR only, never mirrored public). Public repo
          # names differ from the internal program name where the gallery repo
          # was named differently (alpen-client -> alpen). To publish a new
          # program publicly, set its public_repo here — nothing else changes.
          #
          # "private":false makes a program public-only — skip the private ECR
          # push entirely (e.g. strata-checkpoint-sync -> public ECR is the sole
          # canonical image registry; STR-3962). Defaults to true when omitted.
          PROGRAM_CONFIG='{
            "strata":                 {"public_repo":"strata"},
            "strata-checkpoint-sync": {"public_repo":"strata-checkpoint-sync","private":false},
            "alpen-client":           {"public_repo":"alpen"},
            "strata-signer":          {"public_repo":""}
          }'
          ALL='["strata","strata-checkpoint-sync","alpen-client","strata-signer"]'

          if [ "$EVENT" != "workflow_dispatch" ]; then
            # Scheduled / push builds every program.
            PROGRAMS="$ALL"
          else
            # Manual dispatch: one checkbox per program, all default true, so a
            # plain dispatch builds all. Include each ticked program.
            SEL=()
            if [ "$SEL_STRATA" = "true" ];          then SEL+=( '"strata"' ); fi
            if [ "$SEL_CHECKPOINT_SYNC" = "true" ]; then SEL+=( '"strata-checkpoint-sync"' ); fi
            if [ "$SEL_ALPEN_CLIENT" = "true" ];    then SEL+=( '"alpen-client"' ); fi
            if [ "$SEL_STRATA_SIGNER" = "true" ];   then SEL+=( '"strata-signer"' ); fi
            PROGRAMS="[$(IFS=,; echo "${SEL[*]}")]"
          fi

          # Emit an include-only matrix so each job carries its program and the
          # public_repo it maps to. Unknown programs default to private-only.
          MATRIX=$(jq -cn \
            --argjson progs "$PROGRAMS" \
            --argjson cfg "$PROGRAM_CONFIG" \
            '{include: ($progs | map({program: ., private: true} + ($cfg[.] // {public_repo: ""})))}')
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Building: $PROGRAMS"

          # Only strata and alpen-client consume the SP1 artifacts (datatool +
          # guest ELFs). If neither is selected, the SP1 build job is skipped.
          NEEDS_SP1=$(jq -rn --argjson progs "$PROGRAMS" \
            '($progs | any(. == "strata" or . == "alpen-client")) | tostring')
          echo "needs_sp1=${NEEDS_SP1}" >> "$GITHUB_OUTPUT"
          echo "needs_sp1: ${NEEDS_SP1}"

  # ---------------------------------------------------------------------------
  # Build SP1 artifacts (datatool + guest ELFs) — shared by all images
  # ---------------------------------------------------------------------------
  build-sp1-artifacts:
    name: Build SP1 artifacts
    # Depends on prepare so it can read needs_sp1; skips entirely when no
    # selected program consumes SP1 artifacts (prepare already carries the
    # check-new-commits gating).
    needs: [prepare]
    if: always() && needs.prepare.result == 'success' && needs.prepare.outputs.needs_sp1 == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Inline cleanup before checkout — the local composite action needs the
      # repo to exist, but the repo is too large to clone without freeing space.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/.ghcup \
            /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/share/swift \
            /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned 2026-04-21)
        with:
          toolchain: stable

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: sp1-artifacts-builder
          cache-on-failure: true

      - name: Install SP1 core runner override
        uses: ./.github/actions/sp1-core-runner-override # zizmor: ignore[unpinned-uses]

      - name: Install SP1 toolchain
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up
          echo "$HOME/.sp1/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.sp1/bin:$PATH"
          cargo prove --version

      - name: Build strata-datatool + SP1 guest ELFs
        run: |
          cargo build --bin strata-datatool --features sp1-builder --release

          mkdir -p artifacts/elfs/sp1
          install -m 0755 target/release/strata-datatool artifacts/strata-datatool

          # strata-sp1-guest-builder writes compiled ELFs to
          # provers/sp1/guest-*/cache/*.elf.
          cp -v provers/sp1/guest-checkpoint/cache/guest-checkpoint.elf \
               provers/sp1/guest-alpen-chunk/cache/guest-alpen-chunk.elf \
               provers/sp1/guest-alpen-acct/cache/guest-alpen-acct.elf \
            artifacts/elfs/sp1/

          ls -la artifacts/ artifacts/elfs/sp1/

          # Echo VKs for cross-validation against ci-genparams workflow
          CHECKPOINT_VK=$(./target/release/strata-datatool gen-checkpoint-predicate)
          echo "Checkpoint VK (ci-build): ${CHECKPOINT_VK}"

          # Generate EE params for gen-ol-params so the Alpen account predicate is derived
          # through the same params path used by normal generation.
          ./target/release/strata-datatool gen-ee-params \
            --bridge-denomination-sats 200000000 \
            --max-withdrawal-amount-sats 1000000000 \
            --max-withdrawal-descriptor-len 81 \
            -o /tmp/ci-ee-params.json
          ALPEN_VK=$(./target/release/strata-datatool gen-ol-params \
            --ee-params /tmp/ci-ee-params.json \
            --l1-anchor-file .github/fixtures/l1-anchor.json | jq -r '.accounts | to_entries[0].value.predicate')
          echo "Alpen VK (ci-build): ${ALPEN_VK}"

      - name: Upload SP1 artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sp1-artifacts
          path: artifacts/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build and push each program in parallel
  # ---------------------------------------------------------------------------
  build-and-push:
    name: "Build ${{ matrix.program }}"
    needs: [prepare, build-sp1-artifacts]
    # SP1 job may legitimately be skipped (non-SP1 programs only) — accept both.
    if: always() && needs.prepare.result == 'success' && (needs.build-sp1-artifacts.result == 'success' || needs.build-sp1-artifacts.result == 'skipped')
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    outputs:
      short_tag: ${{ steps.resolve.outputs.short_tag }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Resolve actual commit SHA
        id: resolve
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          SHORT_TAG="${COMMIT_SHA:0:7}"
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_tag=${SHORT_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved commit: ${COMMIT_SHA} (tag: ${SHORT_TAG})"

      - name: Free up disk space
        uses: ./.github/actions/cleanup

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Authenticate to the shared ECR account
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        env:
          ROLE_ARN: ${{ secrets.SHARED_ECR_ROLE_ARN }}
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        with:
          mask-password: "true"

      # Public ECR is a distinct registry (public.ecr.aws) with its own auth
      # token, which must be requested from us-east-1. The same assumed role
      # (SHARED_ECR_ROLE_ARN) is authorized to push the public node images —
      # see alpen-infra github-actions-image-push (STR-3894). Only the programs
      # published publicly need this login.
      - name: Login to Amazon ECR Public
        if: matrix.public_repo != ''
        run: |
          aws ecr-public get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin public.ecr.aws

      # --- Download pre-built SP1 artifacts from shared job --------------------
      # Only the SP1-consuming programs need these; for others the SP1 job is
      # skipped and no artifact exists to download.
      - name: Download SP1 artifacts
        if: matrix.program == 'strata' || matrix.program == 'alpen-client'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sp1-artifacts
          path: sp1-artifacts/

      - name: Stage SP1 ELFs for alpen-client
        if: matrix.program == 'alpen-client'
        run: |
          mkdir -p docker/alpen-client/artifacts/elfs/sp1
          cp -v sp1-artifacts/elfs/sp1/guest-alpen-chunk.elf \
               sp1-artifacts/elfs/sp1/guest-alpen-acct.elf \
            docker/alpen-client/artifacts/elfs/sp1/
          ls -la docker/alpen-client/artifacts/elfs/sp1/

      - name: Stage SP1 artifacts for strata
        if: matrix.program == 'strata'
        run: |
          mkdir -p docker/strata/artifacts/elfs/sp1
          install -m 0755 sp1-artifacts/strata-datatool \
            docker/strata/artifacts/strata-datatool
          cp -v sp1-artifacts/elfs/sp1/guest-checkpoint.elf \
            docker/strata/artifacts/elfs/sp1/
          ls -la docker/strata/artifacts/ docker/strata/artifacts/elfs/sp1/

      # --- Build and push via Buildx ------------------------------------------
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_PREFIX: ${{ vars.SHARED_ECR_REPOSITORY_PREFIX }}
          # Public ECR gallery base (fixed alias). External testnet operators
          # pull node images from here without AWS credentials (STR-3894).
          PUBLIC_ECR_BASE: public.ecr.aws/alpenlabs
          PROGRAM: ${{ matrix.program }}
          # Public gallery repo for this program, from the prepare-job map.
          # Empty for private-only programs.
          PUBLIC_REPO: ${{ matrix.public_repo }}
          # Whether to push the private ECR image. false for public-only
          # programs (strata-checkpoint-sync -> public ECR only; STR-3962).
          # Defaults to true via the prepare job's matrix.
          PUSH_PRIVATE: ${{ matrix.private }}
          SHORT_TAG: ${{ steps.resolve.outputs.short_tag }}
          COMMIT_SHA: ${{ steps.resolve.outputs.commit_sha }}
        run: |
          DOCKERFILE_PATH="docker/${PROGRAM}/Dockerfile"
          ECR_REPOSITORY="${ECR_REPOSITORY_PREFIX}/${PROGRAM}"
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${SHORT_TAG}"

          # Push the private image unless this program is public-only
          # (PUSH_PRIVATE=false, e.g. strata-checkpoint-sync -> public ECR is the
          # sole canonical registry; STR-3962). Additionally push a public mirror
          # when the program maps to a public gallery repo (see the prepare job's
          # PROGRAM_CONFIG — e.g. alpen-client -> alpen). The public repo name
          # matches the deployments/IAM naming (strata-checkpoint-sync).
          TAGS=()
          if [ "$PUSH_PRIVATE" != "false" ]; then
            TAGS+=( -t "${FULL_IMAGE}" )
          fi
          if [ -n "$PUBLIC_REPO" ]; then
            TAGS+=( -t "${PUBLIC_ECR_BASE}/${PUBLIC_REPO}:${SHORT_TAG}" )
          fi
          if [ "${#TAGS[@]}" -eq 0 ]; then
            echo "::error::No push target for ${PROGRAM}: private disabled and no public_repo set" >&2
            exit 1
          fi

          # Bake prover features into the strata image. Other programs build
          # with default features. Relies on docker/strata/Dockerfile accepting
          # the CARGO_FEATURES build arg (#1663).
          BUILD_ARGS=()
          if [ "$PROGRAM" = "strata" ]; then
            BUILD_ARGS+=( --build-arg "CARGO_FEATURES=sp1,prover" )
          fi

          # Single build, multiple tags: buildx pushes to both the private and
          # public registries from one image (same digest in both).
          docker buildx build \
            "${BUILD_ARGS[@]}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${COMMIT_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --push \
            "${TAGS[@]}" \
            -f "${DOCKERFILE_PATH}" .

          echo "Successfully pushed ${PROGRAM}:${SHORT_TAG} -> ${TAGS[*]}"

      # --- Publish strata-datatool as its own image ---------------------------
      # Reuses the binary already staged at docker/strata/artifacts/ for the
      # strata image. Consumers (generate-params.yml, other pipelines) can
      # `docker run` this image directly instead of extracting the binary
      # from the larger strata image.
      - name: Build and push strata-datatool image
        if: matrix.program == 'strata'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_PREFIX: ${{ vars.SHARED_ECR_REPOSITORY_PREFIX }}
          SHORT_TAG: ${{ steps.resolve.outputs.short_tag }}
          COMMIT_SHA: ${{ steps.resolve.outputs.commit_sha }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/strata-datatool:${SHORT_TAG}"

          docker buildx build \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${COMMIT_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --push \
            -t "${FULL_IMAGE}" \
            -f docker/strata-datatool/Dockerfile .

          echo "Successfully pushed: ${FULL_IMAGE}"

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Build Summary
    needs: [build-and-push]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Report results
        env:
          SHORT_TAG: ${{ needs.build-and-push.outputs.short_tag }}
          COMMIT_SHA: ${{ needs.build-and-push.outputs.commit_sha }}
          BUILD_RESULT: ${{ needs.build-and-push.result }}
        run: |
          {
            echo "## Build Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Commit** | \`${COMMIT_SHA}\` |"
            echo "| **Image Tag** | \`${SHORT_TAG}\` |"
            echo "| **Ref** | \`${GITHUB_REF_NAME}\` |"
            echo ""
            echo "### Build Status"
            echo "Overall: **${BUILD_RESULT}**"
          } >> "$GITHUB_STEP_SUMMARY"

# Builds new-architecture Docker images on merge to main (or manual dispatch)
# and pushes to the shared ECR account.
#
# Old architecture images (strata-client, strata-sequencer-client, alpen-reth)
# remain in the current account via the existing cd.yml workflow.
#
# After a successful build, this workflow generates SP1 params and dispatches
# a repository_dispatch event to the deployments repo to update Helm values.

name: CI — Build and Push Images

on:
  push:
    branches: [main]
    paths:
      # Only trigger when source code or Dockerfiles change
      - "bin/**"
      - "crates/**"
      - "docker/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
  pull_request: # TODO: remove before merging — temporary trigger for testing
    branches: [main]
    paths:
      - ".github/workflows/ci-build.yml"
  workflow_dispatch:
    inputs:
      programs:
        description: "Comma-separated list of programs to build (leave empty for all)"
        required: false
        type: string
      ref:
        description: "Git ref to build from (default: current branch)"
        required: false
        type: string

env:
  COMMIT: ${{ github.sha }}
  AWS_REGION: us-east-1

permissions:
  contents: read
  id-token: write

# Cancel in-progress runs for the same branch (except main — let those finish)
concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ---------------------------------------------------------------------------
  # Determine which programs to build
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      short_tag: ${{ steps.tag.outputs.short_tag }}
    steps:
      - name: Compute image tag
        id: tag
        run: |
          SHORT_TAG="${COMMIT//[^a-zA-Z0-9._-]/}"
          SHORT_TAG="${SHORT_TAG:0:7}"
          echo "short_tag=${SHORT_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set build matrix
        id: set-matrix
        run: |
          # New architecture images only — pushed to shared ECR account
          ALL='["strata","alpen-client"]'

          INPUT="${{ inputs.programs }}"
          if [ -z "$INPUT" ]; then
            echo "matrix={\"program\":${ALL}}" >> "$GITHUB_OUTPUT"
          else
            # Convert comma-separated input to JSON array
            JSON=$(echo "$INPUT" | jq -Rc 'split(",") | map(gsub("\\s"; ""))')
            echo "matrix={\"program\":${JSON}}" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Build and push each program in parallel
  # ---------------------------------------------------------------------------
  build-and-push:
    name: "Build ${{ matrix.program }}"
    needs: [prepare]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      SHORT_TAG: ${{ needs.prepare.outputs.short_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Free up disk space
        uses: ./.github/actions/cleanup

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      # Authenticate to the shared ECR account
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v4
        with:
          role-to-assume: ${{ secrets.SHARED_ECR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2
        with:
          mask-password: "true"

      # --- Build and push via Buildx ------------------------------------------
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_PREFIX: ${{ vars.SHARED_ECR_REPOSITORY_PREFIX }}
          PROGRAM: ${{ matrix.program }}
        run: |
          DOCKERFILE_PATH="docker/${PROGRAM}/Dockerfile"
          ECR_REPOSITORY="${ECR_REPOSITORY_PREFIX}/${PROGRAM}"
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${SHORT_TAG}"

          docker buildx build \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --push \
            -t "${FULL_IMAGE}" \
            -f "${DOCKERFILE_PATH}" .

          echo "Successfully pushed: ${FULL_IMAGE}"

  # ---------------------------------------------------------------------------
  # Generate SP1 params (verification key)
  # ---------------------------------------------------------------------------
  generate-params:
    name: Generate SP1 params
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    outputs:
      checkpoint_predicate: ${{ steps.genparams.outputs.checkpoint_predicate }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Free up disk space
        uses: ./.github/actions/cleanup

      - name: Set up Clang
        uses: egor-tensin/setup-clang@471a6f8ef1d449dba8e1a51780e7f943572a3f99 # v1
        with:
          version: latest
          platform: x64

      - name: Install SP1 Toolchain
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 https://sp1.succinct.xyz | bash && ~/.sp1/bin/sp1up
          export PATH=~/.sp1/bin:$PATH
          cargo prove --version

      - name: Build strata-datatool and generate params
        id: genparams
        run: |
          set -euo pipefail
          cargo build --bin strata-datatool -F "sp1-builder" --release

          PARAMS_OUTPUT=$(./target/release/strata-datatool genparams --elf-dir docker/prover-client/elfs/sp1)

          # Extract checkpoint_predicate (Sp1Groth16:<hex> format used by new architecture)
          CHECKPOINT_PREDICATE=$(echo "$PARAMS_OUTPUT" | jq -r '.checkpoint_predicate')
          if [ -z "$CHECKPOINT_PREDICATE" ] || [ "$CHECKPOINT_PREDICATE" = "null" ]; then
            echo "Error: Failed to extract checkpoint_predicate from params"
            echo "Params output: $PARAMS_OUTPUT"
            exit 1
          fi

          echo "checkpoint_predicate=${CHECKPOINT_PREDICATE}" >> "$GITHUB_OUTPUT"
          echo "Checkpoint predicate (first 80 chars): ${CHECKPOINT_PREDICATE:0:80}..."

  # ---------------------------------------------------------------------------
  # Dispatch CD to deployments repo
  # ---------------------------------------------------------------------------
  dispatch-cd:
    name: Dispatch CD to deployments
    needs: [prepare, build-and-push, generate-params]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployments repo
        env:
          SHORT_TAG: ${{ needs.prepare.outputs.short_tag }}
          CHECKPOINT_PREDICATE: ${{ needs.generate-params.outputs.checkpoint_predicate }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOYMENTS_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/alpenlabs/deployments/dispatches \
            -d "$(jq -n \
              --arg tag "$SHORT_TAG" \
              --arg cp "$CHECKPOINT_PREDICATE" \
              --arg sha "${{ github.sha }}" \
              --arg ref "${{ github.ref_name }}" \
              '{
                event_type: "new-arch-deploy",
                client_payload: {
                  tag: $tag,
                  checkpoint_predicate: $cp,
                  commit_sha: $sha,
                  ref: $ref
                }
              }')"

          echo "Dispatched CD to deployments repo with tag=${SHORT_TAG}"

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Build Summary
    needs: [prepare, build-and-push, generate-params, dispatch-cd]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report results
        env:
          SHORT_TAG: ${{ needs.prepare.outputs.short_tag }}
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image Tag** | \`${SHORT_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Ref** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Params** | \`${{ needs.generate-params.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **CD Dispatch** | \`${{ needs.dispatch-cd.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Build Status" >> "$GITHUB_STEP_SUMMARY"
          echo "Overall: **${{ needs.build-and-push.result }}**" >> "$GITHUB_STEP_SUMMARY"

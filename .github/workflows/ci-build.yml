# Builds the alpen-client Docker image on merge to main (or manual dispatch)
# and pushes to the shared ECR account (private) and the public ECR gallery.

name: CI — Build and Push Images

on:
  schedule:
    - cron: '30 4,10,16,22 * * *'  # Every 6hr
  push:
    branches: [main]
    paths:
      # Only trigger when source code or Dockerfiles change
      - "bin/**"
      - "crates/**"
      - "docker/alpen-client/**"
      - "provers/sp1/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (default: current branch)"
        required: false
        type: string

env:
  AWS_REGION: us-east-1

# Cancel in-progress runs for the same branch (except main — let those finish)
concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ---------------------------------------------------------------------------
  # Skip scheduled runs if no new commits since last successful build
  # ---------------------------------------------------------------------------
  check-new-commits:
    name: Check for new commits
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check for new commits since last success
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          LAST_SUCCESS=$(gh run list -R "${REPO}" \
            --workflow ci-build.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha // ""')

          if [ "${LAST_SUCCESS}" = "${GITHUB_SHA}" ]; then
            echo "No new commits since last successful build — skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "New commits found — running"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Build SP1 guest ELFs consumed by the alpen-client image
  # ---------------------------------------------------------------------------
  build-sp1-artifacts:
    name: Build SP1 artifacts
    needs: [check-new-commits]
    if: always() && (needs.check-new-commits.result == 'skipped' || needs.check-new-commits.outputs.should_run == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Inline cleanup before checkout — the local composite action needs the
      # repo to exist, but the repo is too large to clone without freeing space.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/.ghcup \
            /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/share/swift \
            /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned 2026-04-21)
        with:
          toolchain: stable

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: sp1-artifacts-builder
          cache-on-failure: true

      - name: Install SP1 core runner override
        uses: ./.github/actions/sp1-core-runner-override # zizmor: ignore[unpinned-uses]

      - name: Install SP1 toolchain
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up
          echo "$HOME/.sp1/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.sp1/bin:$PATH"
          cargo prove --version

      - name: Build SP1 guest ELFs
        run: |
          # The guest builder's build script compiles the guest programs in
          # release mode with the sp1-dev feature and writes the ELFs to
          # provers/sp1/guest-*/cache/*.elf.
          cargo build --release -p strata-sp1-guest-builder --features sp1-dev

          mkdir -p artifacts/elfs/sp1
          cp -v provers/sp1/guest-alpen-chunk/cache/guest-alpen-chunk.elf \
               provers/sp1/guest-alpen-acct/cache/guest-alpen-acct.elf \
            artifacts/elfs/sp1/

          ls -la artifacts/ artifacts/elfs/sp1/

      - name: Upload SP1 artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sp1-artifacts
          path: artifacts/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build and push the alpen-client image
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build alpen-client
    needs: [build-sp1-artifacts]
    if: always() && needs.build-sp1-artifacts.result == 'success'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    outputs:
      short_tag: ${{ steps.resolve.outputs.short_tag }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Resolve actual commit SHA
        id: resolve
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          SHORT_TAG="${COMMIT_SHA:0:7}"
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_tag=${SHORT_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved commit: ${COMMIT_SHA} (tag: ${SHORT_TAG})"

      - name: Free up disk space
        uses: ./.github/actions/cleanup

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Authenticate to the shared ECR account
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        env:
          ROLE_ARN: ${{ secrets.SHARED_ECR_ROLE_ARN }}
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        with:
          mask-password: "true"

      # Public ECR is a distinct registry (public.ecr.aws) with its own auth
      # token, which must be requested from us-east-1. The same assumed role
      # (SHARED_ECR_ROLE_ARN) is authorized to push the public node images —
      # see alpen-infra github-actions-image-push (STR-3894).
      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin public.ecr.aws

      - name: Download SP1 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sp1-artifacts
          path: sp1-artifacts/

      - name: Stage SP1 ELFs for alpen-client
        run: |
          mkdir -p docker/alpen-client/artifacts/elfs/sp1
          cp -v sp1-artifacts/elfs/sp1/guest-alpen-chunk.elf \
               sp1-artifacts/elfs/sp1/guest-alpen-acct.elf \
            docker/alpen-client/artifacts/elfs/sp1/
          ls -la docker/alpen-client/artifacts/elfs/sp1/

      # --- Build and push via Buildx ------------------------------------------
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_PREFIX: ${{ vars.SHARED_ECR_REPOSITORY_PREFIX }}
          # Public ECR gallery base (fixed alias). External testnet operators
          # pull node images from here without AWS credentials (STR-3894).
          # The gallery repo is named `alpen` (not alpen-client).
          PUBLIC_ECR_BASE: public.ecr.aws/alpenlabs
          PUBLIC_REPO: alpen
          SHORT_TAG: ${{ steps.resolve.outputs.short_tag }}
          COMMIT_SHA: ${{ steps.resolve.outputs.commit_sha }}
        run: |
          DOCKERFILE_PATH="docker/alpen-client/Dockerfile"
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/alpen-client:${SHORT_TAG}"

          # Single build, multiple tags: buildx pushes to both the private and
          # public registries from one image (same digest in both).
          docker buildx build \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${COMMIT_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --push \
            -t "${FULL_IMAGE}" \
            -t "${PUBLIC_ECR_BASE}/${PUBLIC_REPO}:${SHORT_TAG}" \
            -f "${DOCKERFILE_PATH}" .

          echo "Successfully pushed alpen-client:${SHORT_TAG}"

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Build Summary
    needs: [build-and-push]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Report results
        env:
          SHORT_TAG: ${{ needs.build-and-push.outputs.short_tag }}
          COMMIT_SHA: ${{ needs.build-and-push.outputs.commit_sha }}
          BUILD_RESULT: ${{ needs.build-and-push.result }}
        run: |
          {
            echo "## Build Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Commit** | \`${COMMIT_SHA}\` |"
            echo "| **Image Tag** | \`${SHORT_TAG}\` |"
            echo "| **Ref** | \`${GITHUB_REF_NAME}\` |"
            echo ""
            echo "### Build Status"
            echo "Overall: **${BUILD_RESULT}**"
          } >> "$GITHUB_STEP_SUMMARY"

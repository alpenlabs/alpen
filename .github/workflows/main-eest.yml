name: Ethereum Execution Spec tests against main branch (via fntests).

on:
  schedule:
    - cron: "30 1 * * *" # every day at 1:30 AM UTC
  workflow_dispatch: # manual run

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  extract-rust-version:
    name: Extract Rust toolchain version
    runs-on: ubuntu-latest
    outputs:
      rust-version: ${{ steps.extract.outputs.rust-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          persist-credentials: false

      - name: Extract Rust toolchain version
        id: extract
        uses: ./.github/actions/extract-rust-version # zizmor: ignore[unpinned-uses]

  run:
    name: Run functional tests
    runs-on: ubuntu-latest
    needs: extract-rust-version
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          persist-credentials: false

      - name: Cleanup Space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          working-directory: functional-tests
          activate-environment: true
          enable-cache: true
          cache-suffix: "functional-tests"

      - name: Set up Rust
        env:
          RUST_NIGHTLY: ${{ needs.extract-rust-version.outputs.rust-version }}
        run: |
          rustup toolchain install "$RUST_NIGHTLY" --profile minimal
          rustup default "$RUST_NIGHTLY"

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          cache-on-failure: true

      - name: Install SP1 core runner override
        uses: ./.github/actions/sp1-core-runner-override # zizmor: ignore[unpinned-uses]

      - name: Build Cargo project
        run: |
          cargo build --locked -p alpen-client --no-default-features --features sequencer --bin alpen-client

      - name: Run alpen EEST env in fntests
        env:
          NO_COLOR: "1"
          LOG_LEVEL: "info"
        run: |
          sudo apt-get install -y screen
          NEWPATH="$(realpath target/debug/)"
          export PATH="${NEWPATH}:${PATH}"
          which alpen-client
          cd functional-tests
          screen -dmS alpen_eest_env uv run python entry.py --keep-alive alpen_eest
          if ! ../contrib/wait-for-json-rpc.sh http://localhost:30303 120; then
            find _dd -type f -name "service.log" -print -exec tail -100 {} \; || true
            exit 1
          fi

      - name: Locate EE proof logs
        run: |
          EE_LOG="$(find functional-tests/_dd -path '*/alpen_eest/ee_sequencer/service.log' -print | sort | tail -n 1)"
          if [ -z "${EE_LOG}" ]; then
            echo "could not find alpen_eest service log"
            find functional-tests/_dd -type f -name "service.log" -print || true
            exit 1
          fi
          echo "EEST_EE_LOG=${EE_LOG}" >> "${GITHUB_ENV}"

      - name: Run tests
        id: runtests
        run: |
          ./contrib/run-eest-remote.sh \
            --rpc-endpoint http://localhost:30303 \
            --fork Prague \
            --tx-wait-timeout 120 \
            --baseline-log-file "${EEST_EE_LOG}" \
            --baseline-output "${RUNNER_TEMP}/eest-ee-log.offset"
        continue-on-error: true

      - name: Assert EE proof pipeline covered EEST blocks
        if: always() && steps.runtests.outcome != 'skipped'
        run: |
          ./contrib/assert-eest-prover-pipeline.sh \
            --log-file "${EEST_EE_LOG}" \
            --baseline-file "${RUNNER_TEMP}/eest-ee-log.offset" \
            --timeout 900

      - name: Stop service
        if: always()
        run: |
          screen -S alpen_eest_env -X quit || true

      - name: Check tests execution
        if: steps.runtests.outcome == 'failure'
        run: |
          echo "Functional tests failed"
          exit 1

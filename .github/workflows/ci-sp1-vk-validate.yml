# Validates SP1 docker builder reproducibility by building guest-checkpoint
# and outputting ELF/VK hashes for comparison with local builds.
#
# Usage: compare the hashes printed in the summary with your local build:
#   cargo build --bin strata-datatool -F "sp1-docker-builder" --release
#   sha256sum provers/sp1/guest-checkpoint/cache/guest-checkpoint.{elf,vk}

name: CI — SP1 VK Reproducibility Check

on:
  workflow_dispatch: {}

concurrency:
  group: ci-sp1-vk-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-vk:
    name: Build and extract VK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          persist-credentials: false

      - name: Free up disk space
        uses: ./.github/actions/cleanup

      - name: Set up Clang
        uses: egor-tensin/setup-clang@8092a31dc33b0c41ee7cc5bb81fd0267490a0161 # v1
        with:
          version: latest
          platform: x64

      - name: Install SP1 Toolchain
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 https://sp1.succinct.xyz | bash && ~/.sp1/bin/sp1up
          export PATH=~/.sp1/bin:$PATH
          cargo prove --version

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0

      - name: Build with docker builder
        run: |
          cargo build --bin strata-datatool -F "sp1-docker-builder" --release 2>&1 || true
          # datatool compile will fail (missing GUEST_ALPEN_ACCT symbols since
          # we only build guest-checkpoint) but ELF/VK are generated before that.

      - name: Extract and display VK hashes
        id: hashes
        run: |
          CACHE="provers/sp1/guest-checkpoint/cache"

          if [ ! -f "${CACHE}/guest-checkpoint.elf" ]; then
            echo "::error::ELF not found — docker build may have failed"
            exit 1
          fi

          ELF_HASH=$(sha256sum "${CACHE}/guest-checkpoint.elf" | awk '{print $1}')
          VK_HASH=$(sha256sum "${CACHE}/guest-checkpoint.vk" | awk '{print $1}')

          echo "elf_hash=${ELF_HASH}" >> "$GITHUB_OUTPUT"
          echo "vk_hash=${VK_HASH}" >> "$GITHUB_OUTPUT"

          echo "ELF SHA256: ${ELF_HASH}"
          echo "VK  SHA256: ${VK_HASH}"
          echo ""
          echo "VK raw bytes:"
          xxd "${CACHE}/guest-checkpoint.vk"

      - name: Summary
        env:
          ELF_HASH: ${{ steps.hashes.outputs.elf_hash }}
          VK_HASH: ${{ steps.hashes.outputs.vk_hash }}
        run: |
          {
            echo "## SP1 VK Reproducibility Check"
            echo ""
            echo "| Artifact | SHA256 |"
            echo "|----------|--------|"
            echo "| guest-checkpoint.elf | \`${ELF_HASH}\` |"
            echo "| guest-checkpoint.vk | \`${VK_HASH}\` |"
            echo ""
            echo "**Commit**: \`$(git rev-parse HEAD)\`"
            echo "**Ref**: \`${GITHUB_REF_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"

name: Ethereum Execution Spec tests against staging alpen-client docker.

on:
  schedule:
    - cron: "0 15 * * *" # Daily at 15:00 UTC
  workflow_dispatch: # Manual trigger (optional)

env:
  COMMIT: ${{ github.sha }}

permissions: {}

jobs:
  setup-services-and-run-ef-tests:
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    runs-on: ubuntu-latest
    environment:
      name: development
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          persist-credentials: false

      - name: Configure AWS ECR Details
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2
        with:
          mask-password: "true"

      - name: Pull alpen-client image from ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_PREFIX: ${{ vars.ECR_REPOSITORY_PREFIX }}
        run: |
          ECR_REPOSITORY="${ECR_REPOSITORY_PREFIX}/alpen-client"
          TAG=$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
            --output text)

          if [ "${TAG}" = "None" ] || [ -z "${TAG}" ]; then
            echo "No tagged images found in ${ECR_REPOSITORY}"
            exit 1
          fi

          echo "Pulling alpen-client:${TAG}"
          IMG_URL="${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          docker pull "${IMG_URL}"
          docker tag "${IMG_URL}" "alpen-client:latest"

      - name: Generate alpen-client keys
        run: |
          pip3 install coincurve
          cd docker && ./init-eest-keys.sh

      - name: Start services
        run: |
          docker compose --env-file docker/.env.alpen \
            -f docker/docker-compose-eest.yml up -d --build

      - name: Wait for alpen-client to be ready
        run: |
          if ! ./contrib/wait-for-json-rpc.sh http://localhost:8545 60; then
            echo "alpen-client failed to start"
            docker logs alpen_eest
            exit 1
          fi

      - name: Capture EEST start block
        run: |
          START_BLOCK="$(curl -sf -X POST http://localhost:8545 \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
            | python3 -c 'import json,sys; print(int(json.load(sys.stdin)["result"], 16))')"
          echo "EEST_START_BLOCK=${START_BLOCK}" >> "${GITHUB_ENV}"

      - name: Run tests
        id: runtests
        run: |
          ./contrib/run-eest-remote.sh \
            --rpc-endpoint http://localhost:8545 \
            --fork Prague \
            --tx-wait-timeout 120
        continue-on-error: true

      - name: Assert EE proof pipeline covered EEST blocks
        if: always() && steps.runtests.outcome != 'skipped'
        run: |
          ./contrib/assert-eest-proof-pipeline.sh \
            --rpc-endpoint http://localhost:8545 \
            --advanced-from "${EEST_START_BLOCK}" \
            --timeout 900

      - name: Tear down services
        if: always()
        run: |
          docker logs alpen_eest || true
          if [ -f docker/.env.alpen ]; then
            docker compose --env-file docker/.env.alpen \
              -f docker/docker-compose-eest.yml down
          fi

      - name: Check tests execution
        if: steps.runtests.outcome == 'failure'
        run: |
          echo "Functional tests failed"
          exit 1

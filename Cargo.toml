  "ssz",
] }
bitcoind-async-client = { version = "0.10.1", features = ["29_0"] }
bitvec = { version = "1.0.1", features = ["serde"] }
borsh = { version = "1.5.0", features = ["derive"] }
bytes = "1.11.1"
cfg-if = "1.0.0"
chrono = "0.4.38"
clap = { version = "4.5.39", default-features = false, features = ["derive"] }
corepc-node = { version = "0.10.0", features = ["29_0"] }
criterion = { version = "0.8.2", features = ["html_reports"] }
deadpool = "0.12.1"
digest = "0.10"
ethnum = "1.5.0"
eyre = "0.6"
format_serde_error = { git = "https://github.com/AlexanderThaller/format_serde_error" }
futures = "0.3"

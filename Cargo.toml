jsonrpsee-types = { version = "0.26.0" }
k256 = { version = "0.13.4", features = ["schnorr"] }
lru = "0.18"
metrics = "0.24"
metrics-exporter-prometheus = "0.16"
mockall = "0.14"
musig2 = { version = "0.1.0", features = ["serde"] }
num_enum = "0.7"
opentelemetry = "0.26"
opentelemetry-otlp = { version = "0.26", features = ["grpc-tonic"] }
opentelemetry_sdk = { version = "0.26", features = ["rt-tokio"] }
parking_lot = "0.12.3"
paste = "1.0"
proptest = "1.9.0"
rand = "0.8.5"
rand_chacha = { version = "0.3.1", default-features = false }
rand_core = { version = "0.6", default-features = false }
reqwest = { version = "0.12.7", default-features = false, features = [
  "http2",
  "rustls-tls",
  "charset",
  "zstd",
  "json",
] }
rkyv = { version = "0.8.14", features = ["little_endian", "pointer_width_32"] }
rkyv_impl = "0.2.2"
rlp = "0.5.2"
schemars = "1"
secp256k1 = { version = "0.29.1", features = ["global-context", "std"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.94"
serde_with = "3.3.0"
sha2 = "0.10.8"
shrex = { version = "1", features = ["serde"] }
shrex_macros = "1"
sled = "0.34.7"
tempfile = "3.10.1"
terrors = "0.3.0"
thiserror = "2.0.11"
threadpool = "1.8"
tokio = { version = "1.37", features = ["full"] }
tokio-stream = "0.1.17"
toml = "0.5"
tower = "0.5"
tracing = "0.1"

[package]
edition = "2021"
name = "strata-storage"
version = "0.3.0"

[lints]
workspace = true

[dependencies]
strata-asm-common.workspace = true
strata-asm-proto-checkpoint-types.workspace = true
strata-checkpoint-types.workspace = true
strata-csm-types.workspace = true
strata-db-store-sled.workspace = true
strata-db-types = { workspace = true, features = ["proxies"] }
strata-identifiers.workspace = true
strata-merkle = { workspace = true, features = ["ssz"] }
strata-merkle-node-store.workspace = true
strata-ol-chain-types = { workspace = true, features = ["test-utils"] }
strata-ol-state-types.workspace = true
strata-paas.workspace = true
strata-primitives.workspace = true
strata-state.workspace = true
strata-storage-common.workspace = true

anyhow.workspace = true
futures.workspace = true
tokio.workspace = true
tracing.workspace = true
zkaleido.workspace = true

[features]
# Exposes `test_runtime_handle()` for downstream crates that construct storage
# managers in their own tests.
test-utils = []

[dev-dependencies]
proptest.workspace = true
strata-asm-proto-checkpoint-types = { workspace = true, features = [
  "test-utils",
] }
strata-db-store-sled.workspace = true
strata-db-tests.workspace = true
strata-identifiers = { workspace = true, features = ["test-utils"] }
strata-ol-state-types = { workspace = true, features = ["test-utils"] }
tokio = { workspace = true, features = ["rt-multi-thread"] }

[package]
name = "strata-proofimpl-checkpoint-new"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
ssz.workspace = true
ssz_primitives.workspace = true
strata-asm-manifest-types.workspace = true
strata-checkpoint-types-ssz.workspace = true
strata-crypto.workspace = true
strata-ledger-types.workspace = true
strata-ol-chain-types-new.workspace = true
strata-ol-state-types.workspace = true
strata-ol-stf.workspace = true
zkaleido.workspace = true

# test-utils dependencies (only included with the feature)
strata-acct-types = { workspace = true, optional = true }
strata-asm-common = { workspace = true, optional = true }
strata-identifiers = { workspace = true, optional = true }
strata-predicate = { workspace = true, optional = true }
strata-snark-acct-types = { workspace = true, optional = true }

[target.'cfg(not(target_os = "zkvm"))'.dependencies]
zkaleido-native-adapter.workspace = true

[dev-dependencies]
strata-identifiers.workspace = true
strata-ol-params.workspace = true
strata-ol-stf = { workspace = true, features = ["test-utils"] }

[features]
test-utils = [
  "strata-ol-stf/test-utils",
  "dep:strata-acct-types",
  "dep:strata-asm-common",
  "dep:strata-identifiers",
  "dep:strata-predicate",
  "dep:strata-snark-acct-types",
]

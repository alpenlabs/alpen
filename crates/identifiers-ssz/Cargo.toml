[package]
name = "strata-identifiers-ssz"
version = "0.1.0"
edition = "2021"

[lints]
workspace = true

[dependencies]
# SSZ runtime dependencies
ssz = { workspace = true }
ssz_derive = { workspace = true }
ssz_types = { workspace = true }
tree_hash = { workspace = true }

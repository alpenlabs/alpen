[package]
name = "strata-identifiers"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
ssz.workspace = true
ssz_derive.workspace = true
ssz_primitives.workspace = true
ssz_types = { workspace = true, features = ["serde"] }
strata-codec = { workspace = true, optional = true }
tree_hash.workspace = true

arbitrary = { workspace = true, optional = true }
borsh = { workspace = true, optional = true }
const-hex = "1.14"
hex.workspace = true
int-enum.workspace = true
proptest = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
thiserror.workspace = true
zeroize = { workspace = true, optional = true }

[dev-dependencies]
strata-test-utils-ssz.workspace = true

bincode.workspace = true
proptest.workspace = true
serde_json.workspace = true

[features]
default = ["arbitrary", "borsh", "codec", "serde", "zeroize"]
zeroize = ["dep:zeroize"]
arbitrary = ["dep:arbitrary"]
borsh = ["dep:borsh"]
codec = ["dep:strata-codec"]
jsonschema = ["dep:schemars"]
serde = ["dep:serde"]
test-utils = ["dep:proptest", "arbitrary"]

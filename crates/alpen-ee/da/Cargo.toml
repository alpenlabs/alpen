[package]
edition = "2021"
name = "alpen-ee-da"
version = "0.3.0-alpha.1"

[lints]
workspace = true

[features]
# No defaults — every consumer explicitly opts into the half (or halves) it
# needs. Picking neither yields an empty crate and a fast compile failure
# at the first attempted import.
default = []
# Runtime DA providers: producer-side blob assembly + chunked envelope
# inscription, plus the Bitcoin-RPC and Reth deps they need.
runtime = [
  "_shared",
  "dep:alpen-ee-common",
  "dep:alpen-ee-database",
  "dep:alpen-reth-db",
  "dep:strata-btc-types",
  "dep:strata-btcio",
  "dep:strata-db-types",
  "dep:strata-identifiers",
  "dep:strata-l1-txfmt",
  "dep:alloy-primitives",
  "dep:async-trait",
  "dep:bitcoind-async-client",
  "dep:eyre",
  "dep:tracing",
]
# Proof-side DA witness verifier. Off by default; enabled by proof crates
# (e.g. strata-proofimpl-alpen-acct) that need to verify a reassembled blob
# against EVM-EE state and chunk public values. Pulls in the EVM execution
# stack via strata-evm-ee.
verification = [
  "_shared",
  "dep:alloy-primitives",
  "dep:revm-primitives",
  "dep:ssz",
  "dep:strata-ee-acct-runtime",
  "dep:strata-ee-chain-types",
  "dep:strata-evm-ee",
  "dep:strata-snark-acct-types",
  "dep:thiserror",
]
# Internal: deps shared by both runtime and verification. Don't enable
# directly — go through `runtime` or `verification`.
_shared = [
  "dep:alpen-ee-da-types",
  "dep:alpen-reth-statediff",
  "dep:bitcoin",
  "dep:strata-codec",
]

[dependencies]
# Shared between runtime and verification (enabled via `_shared`):
alpen-ee-da-types = { workspace = true, optional = true }
alpen-reth-statediff = { workspace = true, optional = true }
bitcoin = { workspace = true, optional = true }
strata-codec = { workspace = true, optional = true }

# Runtime-only deps (enabled by `runtime` feature):
alpen-ee-common = { workspace = true, optional = true }
alpen-ee-database = { workspace = true, optional = true }
alpen-reth-db = { workspace = true, optional = true }
strata-btc-types = { workspace = true, optional = true }
strata-btcio = { workspace = true, optional = true }
strata-db-types = { workspace = true, optional = true }
strata-identifiers = { workspace = true, optional = true }
strata-l1-txfmt = { workspace = true, optional = true }
alloy-primitives = { workspace = true, optional = true }
async-trait = { workspace = true, optional = true }
bitcoind-async-client = { workspace = true, optional = true }
eyre = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }

# Verification-only deps (enabled by `verification` feature):
revm-primitives = { workspace = true, optional = true }
ssz = { workspace = true, optional = true }
strata-ee-acct-runtime = { workspace = true, optional = true }
strata-ee-chain-types = { workspace = true, optional = true }
strata-evm-ee = { workspace = true, optional = true }
strata-snark-acct-types = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }

[dev-dependencies]
# Used by chunking tests (runtime side) + verification integration tests.
rkyv.workspace = true
rsp-mpt.workspace = true
sha2.workspace = true
strata-acct-types.workspace = true
strata-db-store-sled.workspace = true
strata-identifiers.workspace = true
strata-l1-envelope-fmt.workspace = true
strata-storage.workspace = true
threadpool.workspace = true
tokio.workspace = true

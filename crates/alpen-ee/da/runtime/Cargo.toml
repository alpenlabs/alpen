[package]
edition = "2021"
name = "alpen-ee-da-runtime"
version = "0.4.0"

[lints]
workspace = true

[features]
# Off by default: the guest/proof side links only the verifier. The host-side
# prover enables `builders` to construct DA witnesses.
default = []
builders = [
  "dep:alpen-ee-common",
  "dep:alpen-reth-db",
  "dep:async-trait",
  "dep:bitcoind-async-client",
  "dep:strata-identifiers",
  "dep:strata-primitives",
]

[dependencies]
alpen-ee-common = { workspace = true, optional = true }
alpen-ee-da-types.workspace = true
alpen-reth-db = { workspace = true, optional = true }
alpen-reth-statediff.workspace = true

alloy-primitives.workspace = true
async-trait = { workspace = true, optional = true }
bitcoin.workspace = true
bitcoind-async-client = { workspace = true, optional = true }
revm-primitives.workspace = true
ssz.workspace = true
strata-acct-types.workspace = true
strata-codec.workspace = true
strata-ee-acct-runtime.workspace = true
strata-ee-chain-types.workspace = true
strata-evm-ee.workspace = true
strata-identifiers = { workspace = true, optional = true }
strata-primitives = { workspace = true, optional = true }
strata-snark-acct-types.workspace = true
thiserror.workspace = true

[dev-dependencies]
rkyv.workspace = true
rsp-mpt.workspace = true
sha2.workspace = true
strata-l1-envelope-fmt.workspace = true

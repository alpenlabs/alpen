[package]
edition = "2021"
name = "strata-db-types"
version = "0.3.0"

[lints]
workspace = true

[dependencies]
strata-asm-common.workspace = true
strata-asm-proto-checkpoint-types.workspace = true
strata-checkpoint-types.workspace = true
strata-codec.workspace = true
strata-csm-types.workspace = true
strata-identifiers.workspace = true
strata-l1-txfmt.workspace = true
strata-merkle-node-store.workspace = true
strata-ol-chain-types.workspace = true
strata-ol-state-types.workspace = true
strata-paas.workspace = true
strata-primitives.workspace = true
strata-state.workspace = true
strata-storage-common.workspace = true
zkaleido.workspace = true

# Optional: only pulled in by the `proxies` feature, which generates the
# tokio-backed `*Proxy` database wrappers via `gen_proxy`.
strata-db-macros = { workspace = true, optional = true }

anyhow.workspace = true
arbitrary.workspace = true
bitcoin.workspace = true
borsh.workspace = true
serde.workspace = true
thiserror.workspace = true
tokio = { workspace = true, optional = true, features = ["rt"] }
tracing = { workspace = true, optional = true }
typed-sled.workspace = true

[features]
default = []
mocks = []
# Generates `*Proxy` async database wrappers via `gen_proxy`. Pulls in tokio
# (for the spawn_blocking dispatch) and tracing (for the instrumented shims).
proxies = ["dep:strata-db-macros", "dep:tokio", "dep:tracing"]

[dev-dependencies]
proptest.workspace = true
serde_json.workspace = true
strata-identifiers = { workspace = true, features = ["test-utils"] }
strata-merkle = { workspace = true, features = ["ssz"] }

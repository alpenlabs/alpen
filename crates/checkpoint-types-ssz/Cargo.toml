[package]
name = "strata-checkpoint-types-ssz"
version = "0.3.0-alpha.1"
edition = "2024"

[lints]
workspace = true

[dependencies]
# Strata dependencies
strata-crypto.workspace = true
strata-identifiers.workspace = true

# Serialization - SSZ
ssz.workspace = true
ssz_derive.workspace = true
ssz_types.workspace = true

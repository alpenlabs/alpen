tree_hash_derive.workspace = true

# Serialization - Borsh (for state serialization via impl_borsh_via_ssz macros)
borsh.workspace = true

# Serialization - Serde for JSON/RPC
serde = { workspace = true, features = ["derive"] }

# OL types (for parse_ol_logs)
strata-ol-chain-types-new.workspace = true

[package]
name = "strata-ol-params"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
strata-bridge-params.workspace = true
strata-btc-types.workspace = true
strata-identifiers.workspace = true
strata-predicate.workspace = true

arbitrary = { workspace = true, optional = true }
serde.workspace = true

[dev-dependencies]
strata-bridge-params = { workspace = true, features = ["test-defaults"] }
serde_json.workspace = true

[features]
arbitrary = [
  "dep:arbitrary",
  "strata-predicate/arbitrary",
  "strata-bridge-params/arbitrary",
]
test-defaults = ["strata-bridge-params/test-defaults"]
